<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="SWM AI team matching snapshot rendered as a single obfuscated static page."
    />
    <title>SOMA 팀 매칭 현황</title>
    <style>@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");

:root {
  color-scheme: light;
  --bg: #f1f5f9;
  --ink: #0f172a;
  --ink-soft: #475569;
  --panel: #ffffff;
  --border: #e2e8f0;
  --line: rgba(148, 163, 184, 0.18);
  --shadow: 0 1px 3px 0 rgba(15, 23, 42, 0.05);
  --header-bg: #111827;
  --teal: #0f766e;
  --blue: #2563eb;
  --orange: #f97316;
  --violet: #7c3aed;
  --red: #dc2626;
  --gold: #ca8a04;
  --slate: #334155;
  --up: #15803d;
  --down: #b91c1c;
  --flat: #64748b;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family:
    "Pretendard Variable", Pretendard, "SUIT Variable", "Apple SD Gothic Neo",
    "Malgun Gothic", sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-variant-numeric: tabular-nums;
}

body {
  position: relative;
  overflow-x: clip;
}

button,
input,
textarea {
  font: inherit;
}

#app {
  position: relative;
  z-index: 1;
}

.page-shell {
  display: flex;
  flex-direction: column;
  width: min(1440px, calc(100vw - 24px));
  margin: 0 auto;
  padding: 10px 0 20px;
}

.global-header {
  position: sticky;
  top: 8px;
  z-index: 20;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  grid-template-areas:
    "title kpis"
    "meta kpis";
  gap: 10px 24px;
  align-items: center;
  padding: 12px 18px;
  border: 1px solid rgba(30, 41, 59, 0.24);
  border-radius: 10px;
  background: var(--header-bg);
  color: #f8fafc;
}

.global-title {
  grid-area: title;
  display: grid;
  gap: 3px;
}

.global-title h1 {
  margin: 0;
  font-size: clamp(20px, 2.2vw, 28px);
  line-height: 1.08;
  letter-spacing: -0.035em;
  font-weight: 700;
}

.global-eyebrow {
  color: rgba(191, 219, 254, 0.9);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.global-subtitle {
  margin: 2px 0 0;
  color: rgba(226, 232, 240, 0.72);
  font-size: 12px;
  font-weight: 500;
  overflow-wrap: anywhere;
}

.global-kpis {
  grid-area: kpis;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  justify-self: end;
}

.header-kpi {
  display: grid;
  gap: 2px;
  min-width: auto;
  padding: 0;
  border: none;
  border-radius: 0;
  background: transparent;
}

.header-kpi span,
.header-kpi small {
  color: rgba(226, 232, 240, 0.72);
}

.header-kpi span {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
}

.header-kpi strong {
  display: inline-flex;
  align-items: flex-start;
  gap: 0;
  font-size: 24px;
  font-weight: 650;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.header-kpi small {
  font-size: 10px;
  font-weight: 500;
}

.metric-decimal {
  font-size: 0.72em;
  opacity: 0.78;
  transform: translateY(0.06em);
}

.metric-unit {
  margin-left: 1px;
  font-size: 0.6em;
  opacity: 0.72;
  transform: translateY(0.16em);
}

.global-meta {
  grid-area: meta;
  display: flex;
  flex-direction: column;
  gap: 3px;
  align-items: flex-start;
  color: rgba(226, 232, 240, 0.78);
  font-size: 11px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  overflow-wrap: anywhere;
}

.metric-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 10px;
}

.metric-card {
  --accent: var(--slate);
  min-height: 120px;
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.metric-card-main {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
}

.tone-teal {
  --accent: var(--teal);
}

.tone-blue {
  --accent: var(--blue);
}

.tone-orange {
  --accent: var(--orange);
}

.tone-violet {
  --accent: var(--violet);
}

.tone-red {
  --accent: var(--red);
}

.tone-gold {
  --accent: var(--gold);
}

.tone-slate {
  --accent: var(--slate);
}

.metric-label {
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
}

.metric-value {
  margin-top: 4px;
  color: var(--ink);
  font-size: clamp(20px, 2vw, 24px);
  font-weight: 650;
  line-height: 1.02;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}

.metric-detail,
.metric-note,
.metric-delta {
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.metric-detail {
  margin-top: 4px;
}

.metric-delta {
  margin-top: 8px;
}

.metric-delta.up {
  color: var(--up);
}

.metric-delta.down {
  color: var(--down);
}

.metric-delta.flat {
  color: var(--flat);
}

.metric-sparkline {
  width: 84px;
  height: 18px;
  overflow: visible;
}

.metric-sparkline-area {
  fill: var(--accent);
  opacity: 0;
}

.metric-sparkline-line {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.metric-note {
  margin-top: 8px;
}

.mentor-overview-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 8px;
}

.mentor-overview-item {
  display: grid;
  gap: 4px;
}

.mentor-overview-item span {
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0;
}

.mentor-overview-item strong {
  color: var(--ink);
  font-size: 18px;
  font-weight: 650;
  line-height: 1.02;
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
}

.mentor-overview-item .metric-delta {
  margin-top: 2px;
  font-style: normal;
}

.chart-dashboard {
  order: 3;
  margin-top: 10px;
  padding: 16px 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.chart-toolbar {
  display: grid;
  gap: 8px;
}

.chart-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  align-items: center;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  min-width: 0;
}

.chart-summary span {
  min-width: 0;
  overflow-wrap: anywhere;
}

.insight-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.insight-pill {
  display: inline-flex;
  flex-direction: column;
  flex: 1 1 220px;
  gap: 2px;
  max-width: 100%;
  padding: 7px 10px;
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 6px;
  background: #f8fafc;
}

.insight-pill span {
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 500;
}

.insight-pill strong {
  color: var(--ink);
  font-size: 12px;
  font-weight: 500;
  line-height: 1.4;
  overflow-wrap: anywhere;
  word-break: keep-all;
}

.chart-toolbar-main {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  align-items: center;
  justify-content: space-between;
  padding: 0;
  border: none;
  border-radius: 0;
  background: transparent;
}

.chart-toolbar-groups {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.toolbar-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.toolbar-row.segmented {
  padding: 2px;
  border: none;
  border-radius: 6px;
  background: #eef2f7;
}

.toolbar-button {
  appearance: none;
  border: none;
  background: transparent;
  color: var(--ink-soft);
  padding: 4px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition:
    color 120ms ease,
    background 120ms ease,
    box-shadow 120ms ease;
}

.toolbar-button:hover {
  color: var(--ink);
}

.toolbar-button.active {
  color: var(--ink);
  background: #ffffff;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
}

.series-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.series-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 999px;
  background: #ffffff;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 600;
}

.series-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
}

.chart-frame {
  margin-top: 8px;
  height: 560px;
  padding: 6px 0 0;
  border: none;
  border-radius: 0;
  background: transparent;
}

.footer {
  order: 4;
  margin-top: 10px;
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 400;
  opacity: 0.6;
}

.error-state {
  min-height: 280px;
  display: grid;
  place-content: center;
}

@media (max-width: 1180px) {
  .global-header {
    grid-template-columns: 1fr;
    grid-template-areas:
      "title"
      "kpis"
      "meta";
    align-items: flex-start;
  }

  .global-kpis,
  .global-meta {
    justify-content: flex-start;
    align-items: flex-start;
  }

  .metric-row {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 820px) {
  .page-shell {
    width: 100%;
    padding: 8px 8px 18px;
  }

  .metric-row {
    order: 2;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .global-header {
    top: 6px;
    gap: 8px;
    padding: 10px 14px;
  }

  .chart-toolbar-main {
    justify-content: flex-start;
  }

  .chart-frame {
    height: 420px;
  }

  .chart-dashboard {
    order: 3;
  }
}

@media (max-width: 560px) {
  .page-shell {
    padding: 8px 8px 18px;
  }

  .global-header {
    position: static;
    grid-template-columns: 1fr;
    grid-template-areas:
      "title"
      "kpis"
      "meta";
    gap: 8px;
    padding: 10px 12px;
    box-shadow: none;
  }

  .global-eyebrow {
    display: none;
  }

  .global-title h1 {
    font-size: 18px;
  }

  .global-subtitle {
    font-size: 10px;
  }

  .global-kpis {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    width: 100%;
    gap: 8px;
  }

  .header-kpi {
    min-width: 0;
    padding: 0;
  }

  .header-kpi strong {
    font-size: 16px;
  }

  .header-kpi small {
    display: none;
  }

  .global-meta {
    align-items: flex-start;
    font-size: 10px;
  }

  .chart-dashboard {
    order: 3;
    margin-top: 10px;
    padding: 8px;
  }

  .metric-row {
    order: 2;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-top: 10px;
  }

  .metric-card {
    min-height: auto;
    padding: 10px 11px;
    border-radius: 8px;
    box-shadow: none;
  }

  .metric-card-main {
    grid-template-columns: 1fr;
    gap: 4px;
  }

  .metric-label {
    font-size: 10px;
  }

  .metric-value {
    margin-top: 2px;
    font-size: 19px;
  }

  .metric-detail,
  .metric-note,
  .metric-delta,
  .mentor-overview-item span {
    font-size: 9px;
  }

  .mentor-overview-item strong {
    font-size: 15px;
  }

  .metric-sparkline {
    display: none;
  }

  .mentor-overview-card {
    grid-column: 1 / -1;
  }

  .mentor-overview-card .metric-label {
    margin-bottom: 6px;
  }

  .chart-toolbar {
    gap: 6px;
  }

  .chart-summary {
    gap: 4px 8px;
    font-size: 10px;
    flex-direction: column;
    align-items: flex-start;
  }

  .insight-strip {
    flex-direction: column;
  }

  .insight-pill {
    flex: 0 1 auto;
    padding: 6px 8px;
  }

  .chart-toolbar-main {
    align-items: stretch;
    gap: 6px;
    padding: 0;
  }

  .chart-toolbar-groups {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    overflow-x: visible;
    width: 100%;
  }

  .toolbar-row.segmented {
    width: 100%;
    flex-wrap: wrap;
  }

  .toolbar-row.compact {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .toolbar-button {
    flex: 1 1 0;
    min-height: 40px;
    min-width: 0;
    padding: 10px 8px;
    font-size: 12px;
  }

  .series-strip {
    display: none;
  }

  .mentor-overview-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .mentor-overview-item {
    gap: 2px;
  }

  .chart-frame {
    margin-top: 6px;
    height: min(340px, 74vw);
    min-height: 270px;
    padding: 8px 2px 0;
  }

  .footer {
    margin-top: 8px;
    font-size: 10px;
  }
}
</style>
