<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="SWM AI team matching snapshot rendered as a single obfuscated static page."
    />
    <title>SOMA Team Matching Board</title>
    <style>:root {
  color-scheme: light;
  --bg: #f8fafc;
  --ink: #0f172a;
  --ink-soft: #475569;
  --panel: #ffffff;
  --panel-strong: #ffffff;
  --border: rgba(15, 23, 42, 0.08);
  --shadow:
    0 1px 2px rgba(15, 23, 42, 0.05),
    0 14px 36px rgba(15, 23, 42, 0.06);
  --teal: #0f766e;
  --blue: #2563eb;
  --orange: #f97316;
  --violet: #7c3aed;
  --red: #dc2626;
  --gold: #ca8a04;
  --up: #166534;
  --down: #b91c1c;
  --flat: #64748b;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family:
    "SUIT Variable", "Pretendard Variable", "Apple SD Gothic Neo",
    "Malgun Gothic", sans-serif;
  font-size: 14px;
  background:
    radial-gradient(circle at top left, rgba(15, 118, 110, 0.07), transparent 24%),
    radial-gradient(circle at top right, rgba(37, 99, 235, 0.1), transparent 28%),
    linear-gradient(180deg, #f8fafc 0%, #f8fafc 48%, #f1f5f9 100%);
  color: var(--ink);
}

body {
  position: relative;
}

button,
input,
textarea {
  font: inherit;
}

#app {
  position: relative;
  z-index: 1;
}

.page-shell {
  position: relative;
  width: min(1180px, calc(100vw - 28px));
  margin: 0 auto;
  padding: 24px 0 48px;
}

.status-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 14px;
  align-items: center;
  padding: 12px 16px;
  border: 1px solid rgba(15, 23, 42, 0.1);
  border-radius: 14px;
  background: rgba(15, 23, 42, 0.94);
  color: rgba(241, 245, 249, 0.82);
  box-shadow: 0 16px 30px rgba(15, 23, 42, 0.18);
  font-size: 12px;
  letter-spacing: 0.02em;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 9px;
  border-radius: 999px;
  background: rgba(148, 163, 184, 0.18);
  color: #f8fafc;
  font-weight: 700;
}

.hero,
.chart-panel,
.insight-card,
.metric-card {
  backdrop-filter: blur(10px);
}

.hero {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 16px;
  margin-top: 16px;
  padding: 24px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.98)),
    var(--panel-strong);
  box-shadow: var(--shadow);
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(37, 99, 235, 0.08);
  color: #1d4ed8;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.hero h1 {
  margin: 12px 0;
  font-size: clamp(36px, 4vw, 60px);
  line-height: 0.92;
  letter-spacing: -0.05em;
}

.hero-description {
  max-width: 640px;
  margin: 0;
  color: var(--ink-soft);
  font-size: 14px;
  line-height: 1.75;
}

.hero-summary {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 18px;
}

.hero-summary-card {
  padding: 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(248, 250, 252, 0.95), #ffffff);
}

.hero-summary-card span {
  display: block;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.hero-summary-card strong {
  display: block;
  margin-top: 8px;
  font-size: 28px;
  letter-spacing: -0.05em;
  font-variant-numeric: tabular-nums;
}

.hero-meta {
  display: grid;
  gap: 10px;
}

.meta-chip {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 16px;
  border-radius: 14px;
  background: #ffffff;
  border: 1px solid var(--border);
  color: var(--ink-soft);
  font-size: 12px;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.5),
    0 1px 2px rgba(15, 23, 42, 0.04);
}

.meta-chip strong {
  color: var(--ink);
  font-size: 20px;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}

.metric-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 16px;
}

.metric-card {
  padding: 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.metric-card::before {
  content: "";
  display: block;
  width: 40px;
  height: 3px;
  margin-bottom: 14px;
  border-radius: 999px;
  background: currentColor;
  opacity: 0.88;
}

.metric-card-top {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 120px;
  gap: 12px;
  align-items: end;
}

.tone-teal {
  color: var(--teal);
}

.tone-blue {
  color: var(--blue);
}

.tone-orange {
  color: var(--orange);
}

.tone-violet {
  color: var(--violet);
}

.tone-red {
  color: var(--red);
}

.tone-gold {
  color: var(--gold);
}

.metric-label {
  margin-bottom: 8px;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.metric-value {
  color: var(--ink);
  font-size: clamp(26px, 3vw, 40px);
  font-weight: 800;
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
}

.metric-delta {
  margin-top: 12px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.metric-delta.up {
  color: var(--up);
}

.metric-delta.down {
  color: var(--down);
}

.metric-delta.flat {
  color: var(--flat);
}

.metric-sparkline {
  width: 120px;
  height: 40px;
  overflow: visible;
}

.metric-sparkline-area {
  fill: currentColor;
  opacity: 0.08;
}

.metric-sparkline-line {
  fill: none;
  stroke: currentColor;
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.chart-panel {
  margin-top: 16px;
  padding: 24px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--panel-strong);
  box-shadow: var(--shadow);
}

.panel-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.panel-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.05em;
}

.panel-description {
  margin: 8px 0 0;
  color: var(--ink-soft);
  font-size: 14px;
  line-height: 1.7;
}

.panel-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  justify-content: flex-end;
  color: var(--ink-soft);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 20px;
}

.toolbar-group {
  display: grid;
  gap: 6px;
}

.toolbar-group.compact {
  min-width: 180px;
}

.toolbar-label {
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.toolbar-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.toolbar-row.segmented {
  padding: 4px;
  border-radius: 12px;
  border: 1px solid rgba(15, 23, 42, 0.08);
  background: rgba(15, 23, 42, 0.035);
}

.toolbar-button {
  appearance: none;
  border: none;
  background: transparent;
  color: var(--ink-soft);
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition:
    transform 140ms ease,
    color 140ms ease,
    background 140ms ease,
    box-shadow 140ms ease;
}

.toolbar-button:hover {
  color: var(--ink);
}

.toolbar-button.active {
  color: #0f172a;
  background: #ffffff;
  box-shadow:
    0 1px 2px rgba(15, 23, 42, 0.08),
    inset 0 0 0 1px rgba(15, 23, 42, 0.06);
}

.series-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.series-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: #ffffff;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 700;
}

.series-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
}

.chart-frame {
  position: relative;
  margin-top: 16px;
  height: 460px;
  padding: 12px;
  border-radius: 14px;
  background: #f1f5f9;
  border: 1px solid rgba(15, 23, 42, 0.08);
  box-shadow: inset 0 2px 4px rgba(15, 23, 42, 0.05);
}

.chart-caption {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 14px;
  color: var(--ink-soft);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

.insight-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 16px;
}

.insight-card {
  padding: 20px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: #ffffff;
  box-shadow: var(--shadow);
}

.insight-title {
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.insight-value {
  margin-top: 10px;
  font-size: clamp(30px, 3vw, 44px);
  font-weight: 800;
  letter-spacing: -0.05em;
  font-variant-numeric: tabular-nums;
}

.insight-description {
  margin: 10px 0 0;
  color: var(--ink-soft);
  font-size: 14px;
  line-height: 1.7;
}

.footer {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 14px;
  margin-top: 16px;
  padding: 0 4px;
  color: var(--ink-soft);
  font-size: 12px;
}

.error-state {
  min-height: 280px;
  display: grid;
  place-content: center;
  text-align: center;
}

@media (max-width: 980px) {
  .page-shell {
    width: min(100vw - 20px, 100%);
    padding-top: 16px;
  }

  .hero,
  .metric-grid,
  .insight-grid {
    grid-template-columns: 1fr;
  }

  .panel-head,
  .chart-caption,
  .footer {
    flex-direction: column;
    align-items: flex-start;
  }

  .hero-summary,
  .metric-card-top {
    grid-template-columns: 1fr;
  }

  .chart-frame {
    height: 360px;
  }
}

@media (max-width: 640px) {
  .status-strip {
    padding: 10px 12px;
  }

  .hero,
  .chart-panel,
  .metric-card,
  .insight-card {
    padding: 18px;
    border-radius: 14px;
  }

  .hero h1 {
    font-size: 38px;
  }

  .chart-frame {
    height: 320px;
    padding: 8px;
  }
}
</style>
